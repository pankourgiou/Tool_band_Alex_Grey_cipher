<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f0d0a;--gold:#c8922a;--gdim:#7a5518;
  --parch:#ede0c4;--muted:#6b5d42;
  --border:#2a2010;--surf:#181410;--surf2:#1f1a10;
}
body{
  background:var(--bg);color:var(--parch);
  font-family:'IM Fell English',serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:44px 20px 80px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(200,146,42,.024) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,146,42,.024) 1px,transparent 1px);
  background-size:34px 34px;
}
*{position:relative;z-index:1;}
.title{
  font-family:'Cinzel',serif;font-weight:900;
  font-size:clamp(28px,5vw,54px);color:var(--gold);
  letter-spacing:.14em;text-shadow:0 0 50px rgba(200,146,42,.4);
  margin-bottom:6px;
}
.sub{font-size:13px;color:var(--muted);font-style:italic;letter-spacing:.06em;margin-bottom:24px;}
.rule{width:240px;height:1px;background:linear-gradient(to right,transparent,var(--gdim),transparent);margin-bottom:28px;}
.tabs{
  display:flex;margin-bottom:28px;
  border:1px solid var(--border);border-radius:3px;overflow:hidden;
  width:100%;max-width:740px;
}
.tab{
  flex:1;padding:10px 0;text-align:center;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;
  color:var(--muted);cursor:pointer;background:var(--surf);
  border:none;transition:all .2s;
}
.tab:first-child{border-right:1px solid var(--border);}
.tab.active{color:var(--gold);background:var(--surf2);}
.tab:hover:not(.active){color:var(--parch);}
.mode{display:none;width:100%;max-width:740px;flex-direction:column;}
.mode.active{display:flex;}
.lbl{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:.22em;
  color:var(--muted);margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
}
.lbl::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
.glyph-out{
  min-height:110px;background:var(--surf);
  border:1px solid var(--border);border-radius:2px;
  padding:14px 16px;display:flex;flex-wrap:wrap;gap:3px;align-items:flex-end;
  margin-bottom:10px;
}
.ph{font-style:italic;color:var(--muted);font-size:14px;width:100%;text-align:center;padding:22px 0;}
.gc{
  display:inline-flex;flex-direction:column;align-items:center;gap:3px;
  padding:3px 2px;border-radius:2px;transition:background .12s;position:relative;
}
.gc.clickable{cursor:pointer;}
.gc.clickable:hover{background:rgba(139,58,42,.2);}
.gc.clickable:hover::after{content:'x';position:absolute;top:-3px;right:0;font-size:9px;color:#a04030;font-family:Cinzel,serif;}
.gc img{width:48px;height:48px;object-fit:contain;display:block;}
.gc .sp{width:20px;height:48px;}
.gc .gl{font-family:'Cinzel',serif;font-size:8px;color:var(--muted);}
.actions{display:flex;justify-content:flex-end;gap:8px;margin-bottom:28px;}
.btn{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:.18em;
  padding:7px 16px;background:transparent;
  border:1px solid var(--border);color:var(--muted);
  cursor:pointer;border-radius:2px;transition:all .2s;
}
.btn:hover{border-color:var(--gdim);color:var(--gold);}
.btn.dl{border-color:var(--gdim);color:var(--gold);}
textarea{
  width:100%;min-height:90px;background:var(--surf);
  border:1px solid var(--border);border-radius:2px;
  color:var(--parch);font-family:'IM Fell English',serif;font-size:18px;
  padding:14px 16px;resize:vertical;outline:none;line-height:1.6;
  caret-color:var(--gold);transition:border-color .2s;margin-bottom:20px;
}
textarea:focus{border-color:var(--gdim);}
textarea::placeholder{color:var(--muted);font-style:italic;font-size:15px;}
#picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:6px;}
.pc{
  background:var(--surf);border:1px solid var(--border);border-radius:2px;
  padding:10px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;transition:border-color .15s,background .15s;user-select:none;
}
.pc:hover{border-color:var(--gdim);background:var(--surf2);}
.pc:active{transform:scale(.94);}
.pc img{width:44px;height:44px;object-fit:contain;}
.pc .pl{font-family:'Cinzel',serif;font-size:10px;color:var(--muted);}
.sp-key{
  grid-column:span 2;background:var(--surf);border:1px solid var(--border);
  border-radius:2px;padding:13px 4px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;user-select:none;
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;color:var(--muted);
}
.sp-key:hover{border-color:var(--gdim);color:var(--gold);background:var(--surf2);}
canvas{display:none;}
</style>
</head>
<body>
<div class="title">CIPHER</div>
<div class="sub">Encrypt your words in ancient script</div>
<div class="rule"></div>

<div class="tabs">
  <button class="tab active" id="tab-build" onclick="setMode('build')">BUILD — click glyphs</button>
  <button class="tab" id="tab-type" onclick="setMode('type')">ENCRYPT — type message</button>
</div>

<div class="mode active" id="mode-build">
  <div class="lbl">OUTPUT</div>
  <div class="glyph-out" id="build-out"><span class="ph">Click glyphs below to compose...</span></div>
  <div class="actions">
    <button class="btn" onclick="buildDelete()">DELETE</button>
    <button class="btn" onclick="buildClear()">CLEAR</button>
    <button class="btn dl" onclick="doDownload('build-out')">DOWNLOAD PNG</button>
  </div>
  <div class="lbl">ALPHABET</div>
  <div id="picker"></div>
</div>

<div class="mode" id="mode-type">
  <div class="lbl">YOUR MESSAGE</div>
  <textarea id="type-input" placeholder="Type your message here..." oninput="typeTranslate()" spellcheck="false"></textarea>
  <div class="lbl">ENCRYPTED OUTPUT</div>
  <div class="glyph-out" id="type-out"><span class="ph">Your cipher will appear here...</span></div>
  <div class="actions">
    <button class="btn" onclick="document.getElementById('type-input').value='';typeTranslate()">CLEAR</button>
    <button class="btn dl" onclick="doDownload('type-out')">DOWNLOAD PNG</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
// Load glyphs safely from JSON tag
var G = JSON.parse(document.getElementById('glyph-data').textContent);

function setMode(m) {
  document.getElementById('tab-build').classList.toggle('active', m === 'build');
  document.getElementById('tab-type').classList.toggle('active', m === 'type');
  document.getElementById('mode-build').classList.toggle('active', m === 'build');
  document.getElementById('mode-type').classList.toggle('active', m === 'type');
  if (m === 'type') document.getElementById('type-input').focus();
}

function makeCell(ch, clickable, onRemove) {
  var cell = document.createElement('div');
  cell.className = 'gc' + (clickable ? ' clickable' : '');
  if (clickable) cell.onclick = onRemove;
  if (ch === ' ') {
    var sp = document.createElement('div');
    sp.className = 'sp';
    cell.appendChild(sp);
  } else if (G[ch]) {
    var img = document.createElement('img');
    img.src = G[ch];
    img.alt = ch;
    cell.appendChild(img);
    var lbl = document.createElement('div');
    lbl.className = 'gl';
    lbl.textContent = ch;
    cell.appendChild(lbl);
  } else {
    var u = document.createElement('div');
    u.style.cssText = 'width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-family:Cinzel,serif;font-size:22px;color:var(--gdim);';
    u.textContent = ch.toUpperCase();
    cell.appendChild(u);
    var lbl2 = document.createElement('div');
    lbl2.className = 'gl';
    lbl2.textContent = ch;
    cell.appendChild(lbl2);
  }
  return cell;
}

// BUILD MODE
var buildChars = [];
function buildRender() {
  var out = document.getElementById('build-out');
  if (!buildChars.length) { out.innerHTML = '<span class="ph">Click glyphs below to compose...</span>'; return; }
  out.innerHTML = '';
  buildChars.forEach(function(ch, idx) {
    out.appendChild(makeCell(ch, true, function() { buildChars.splice(idx, 1); buildRender(); }));
  });
}
function buildAdd(ch) { buildChars.push(ch); buildRender(); }
function buildDelete() { buildChars.pop(); buildRender(); }
function buildClear() { buildChars = []; buildRender(); }

// TYPE MODE
function typeTranslate() {
  var text = document.getElementById('type-input').value.toLowerCase();
  var out = document.getElementById('type-out');
  if (!text) { out.innerHTML = '<span class="ph">Your cipher will appear here...</span>'; return; }
  out.innerHTML = '';
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch === '\n') {
      var br = document.createElement('div');
      br.style.cssText = 'width:100%;height:8px;';
      out.appendChild(br);
    } else {
      out.appendChild(makeCell(ch, false, null));
    }
  }
}

// DOWNLOAD
var preloaded = {};
Object.keys(G).forEach(function(k) {
  var im = new Image();
  im.src = G[k];
  preloaded[k] = im;
});

function doDownload(outId) {
  var cells = document.getElementById(outId).querySelectorAll('.gc');
  if (!cells.length) return;
  var GSIZE = 72, PAD = 20, GAP = 4, LABEL = 14;
  var perRow = Math.min(cells.length, 14);
  var rows = Math.ceil(cells.length / perRow);
  var CW = perRow * (GSIZE + GAP) + PAD * 2;
  var CH = rows * (GSIZE + LABEL + GAP) + PAD * 2;
  var canvas = document.getElementById('canvas');
  canvas.width = CW; canvas.height = CH;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#13110e';
  ctx.fillRect(0, 0, CW, CH);
  var col = 0, row = 0;
  cells.forEach(function(cell) {
    var glEl = cell.querySelector('.gl');
    var ch = glEl ? glEl.textContent : ' ';
    var x = PAD + col * (GSIZE + GAP);
    var y = PAD + row * (GSIZE + LABEL + GAP);
    if (ch !== ' ' && preloaded[ch] && preloaded[ch].complete) {
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.beginPath();
      ctx.roundRect(x, y, GSIZE, GSIZE, 3);
      ctx.fill();
      ctx.drawImage(preloaded[ch], x, y, GSIZE, GSIZE);
      ctx.fillStyle = 'rgba(200,146,42,0.6)';
      ctx.font = 'bold 9px serif';
      ctx.textAlign = 'center';
      ctx.fillText(ch, x + GSIZE / 2, y + GSIZE + 11);
    } else if (ch !== ' ') {
      ctx.fillStyle = 'rgba(200,146,42,0.12)';
      ctx.fillRect(x, y, GSIZE, GSIZE);
      ctx.fillStyle = '#c8922a';
      ctx.font = 'bold 24px serif';
      ctx.textAlign = 'center';
      ctx.fillText(ch.toUpperCase(), x + GSIZE / 2, y + GSIZE / 2 + 8);
    }
    col++;
    if (col >= perRow) { col = 0; row++; }
  });
  var link = document.createElement('a');
  link.download = 'cipher.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// KEYBOARD
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('mode-build').classList.contains('active')) return;
  if (e.ctrlKey || e.metaKey) return;
  if (e.key === 'Backspace') { e.preventDefault(); buildDelete(); }
  else if (e.key === ' ') { e.preventDefault(); buildAdd(' '); }
  else if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) buildAdd(e.key.toLowerCase());
});

// BUILD PICKER
var picker = document.getElementById('picker');
'abcdefghijklmnopqrstuvwxyz'.split('').forEach(function(letter) {
  var card = document.createElement('div');
  card.className = 'pc';
  card.onclick = function() { buildAdd(letter); };
  if (G[letter]) {
    var img = document.createElement('img');
    img.src = G[letter];
    card.appendChild(img);
  } else {
    var u = document.createElement('div');
    u.style.cssText = 'width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-family:Cinzel,serif;font-size:18px;color:var(--gdim);border:1px dashed;border-radius:2px;';
    u.textContent = letter.toUpperCase();
    card.appendChild(u);
  }
  var lbl = document.createElement('div');
  lbl.className = 'pl';
  lbl.textContent = letter;
  card.appendChild(lbl);
  picker.appendChild(card);
});
var spk = document.createElement('div');
spk.className = 'sp-key';
spk.textContent = 'SPACE';
spk.onclick = function() { buildAdd(' '); };
picker.appendChild(spk);
</script>
</body>
